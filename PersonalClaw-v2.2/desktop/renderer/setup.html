<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PersonalClaw Setup</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .setup-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 700px;
            width: 100%;
            padding: 40px;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            font-size: 36px;
            color: #667eea;
            margin-bottom: 10px;
        }

        .logo p {
            color: #666;
            font-size: 16px;
        }

        .form-section {
            margin-bottom: 30px;
        }

        .form-section h2 {
            font-size: 20px;
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #555;
            margin-bottom: 8px;
        }

        .form-group label .optional {
            color: #999;
            font-weight: normal;
            font-size: 12px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group input::placeholder {
            color: #aaa;
        }

        .help-text {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #666;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .status-message {
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .status-message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status-message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .collapsible {
            cursor: pointer;
            user-select: none;
        }

        .collapsible::before {
            content: '▼ ';
            display: inline-block;
            transition: transform 0.3s;
        }

        .collapsible.collapsed::before {
            transform: rotate(-90deg);
        }

        .collapsible-content {
            max-height: 1000px;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }

        .collapsible-content.collapsed {
            max-height: 0;
        }
    </style>
</head>
<body>
    <div class="setup-container">
        <div class="logo">
            <h1>🦞 PersonalClaw</h1>
            <p>Let's set up your AI assistant</p>
        </div>

        <form id="setupForm">
            <!-- LLM Providers -->
            <div class="form-section">
                <h2>LLM Providers</h2>
                <div class="form-group">
                    <label>Anthropic API Key <span class="optional">(optional)</span></label>
                    <input type="password" name="ANTHROPIC_API_KEY" placeholder="sk-ant-...">
                    <div class="help-text">For Claude AI models</div>
                </div>
                <div class="form-group">
                    <label>OpenAI API Key <span class="optional">(optional)</span></label>
                    <input type="password" name="OPENAI_API_KEY" placeholder="sk-...">
                    <div class="help-text">For GPT-4 and other OpenAI models</div>
                </div>
                <div class="form-group">
                    <label>Gemini API Key <span class="optional">(optional)</span></label>
                    <input type="password" name="GEMINI_API_KEY" placeholder="AIza...">
                    <div class="help-text">For Google Gemini models</div>
                </div>
                <div class="form-group">
                    <label>Default LLM Provider</label>
                    <input type="text" name="LLM_PROVIDER" value="anthropic" placeholder="anthropic, openai, gemini, or ollama">
                </div>
            </div>

            <!-- Telegram -->
            <div class="form-section">
                <h2 class="collapsible">Telegram Bot</h2>
                <div class="collapsible-content">
                    <div class="form-group">
                        <label>Bot Token <span class="optional">(optional)</span></label>
                        <input type="password" name="TELEGRAM_BOT_TOKEN" placeholder="123456:ABC-DEF...">
                    </div>
                    <div class="form-group">
                        <label>Chat ID <span class="optional">(optional)</span></label>
                        <input type="text" name="TELEGRAM_CHAT_ID" placeholder="123456789">
                    </div>
                </div>
            </div>

            <!-- Voice -->
            <div class="form-section">
                <h2 class="collapsible collapsed">Voice Interface</h2>
                <div class="collapsible-content collapsed">
                    <div class="form-group">
                        <label>Deepgram API Key <span class="optional">(optional)</span></label>
                        <input type="password" name="DEEPGRAM_API_KEY" placeholder="Speech-to-text">
                    </div>
                    <div class="form-group">
                        <label>ElevenLabs API Key <span class="optional">(optional)</span></label>
                        <input type="password" name="ELEVENLABS_API_KEY" placeholder="Text-to-speech">
                    </div>
                    <div class="form-group">
                        <label>ElevenLabs Voice ID <span class="optional">(optional)</span></label>
                        <input type="text" name="ELEVENLABS_VOICE_ID" placeholder="Voice ID">
                    </div>
                </div>
            </div>

            <!-- Email -->
            <div class="form-section">
                <h2 class="collapsible collapsed">Email Integration</h2>
                <div class="collapsible-content collapsed">
                    <div class="form-group">
                        <label>SMTP Host <span class="optional">(optional)</span></label>
                        <input type="text" name="EMAIL_HOST" placeholder="smtp.gmail.com">
                    </div>
                    <div class="form-group">
                        <label>SMTP Port <span class="optional">(optional)</span></label>
                        <input type="text" name="EMAIL_PORT" placeholder="587">
                    </div>
                    <div class="form-group">
                        <label>Email User <span class="optional">(optional)</span></label>
                        <input type="email" name="EMAIL_USER" placeholder="your@email.com">
                    </div>
                    <div class="form-group">
                        <label>Email Password <span class="optional">(optional)</span></label>
                        <input type="password" name="EMAIL_PASSWORD" placeholder="App password">
                    </div>
                    <div class="form-group">
                        <label>From Email <span class="optional">(optional)</span></label>
                        <input type="email" name="EMAIL_FROM" placeholder="your@email.com">
                    </div>
                </div>
            </div>

            <!-- Security -->
            <div class="form-section">
                <h2 class="collapsible collapsed">Security</h2>
                <div class="collapsible-content collapsed">
                    <div class="form-group">
                        <label>Emergency Unlock Code <span class="optional">(optional)</span></label>
                        <input type="password" name="EMERGENCY_UNLOCK_CODE" placeholder="Your secure code">
                        <div class="help-text">For Guardian Agent emergency unlock</div>
                    </div>
                </div>
            </div>

            <div class="button-group">
                <button type="button" class="btn-secondary" onclick="skipSetup()">Skip for Now</button>
                <button type="submit" class="btn-primary">Save & Start</button>
            </div>

            <div id="statusMessage" class="status-message"></div>
        </form>
    </div>

    <script>
        // Collapsible sections
        document.querySelectorAll('.collapsible').forEach(header => {
            header.addEventListener('click', () => {
                header.classList.toggle('collapsed');
                const content = header.nextElementSibling;
                content.classList.toggle('collapsed');
            });
        });

        // Form submission
        document.getElementById('setupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const config = {};
            
            for (let [key, value] of formData.entries()) {
                if (value.trim()) {
                    config[key] = value.trim();
                }
            }

            // Add default values
            if (!config.PORT) config.PORT = '18789';
            if (!config.HOST) config.HOST = '127.0.0.1';
            if (!config.NODE_ENV) config.NODE_ENV = 'development';

            try {
                const result = await window.electronAPI.saveConfig(config);
                
                if (result.success) {
                    showMessage('Configuration saved successfully! Starting PersonalClaw...', 'success');
                    setTimeout(() => {
                        window.electronAPI.startApp();
                    }, 1500);
                } else {
                    showMessage('Error: ' + result.error, 'error');
                }
            } catch (error) {
                showMessage('Error saving configuration: ' + error.message, 'error');
            }
        });

        function skipSetup() {
            if (confirm('Skip setup? You can configure settings later from the Settings menu.')) {
                window.electronAPI.skipSetup();
            }
        }

        function showMessage(text, type) {
            const msg = document.getElementById('statusMessage');
            msg.textContent = text;
            msg.className = 'status-message ' + type;
            msg.style.display = 'block';
        }
    </script>
</body>
</html>
