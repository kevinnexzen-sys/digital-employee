<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PersonalClaw Avatar</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    #avatar-container {
      width: 300px;
      height: 300px;
      position: relative;
    }

    #face {
      width: 200px;
      height: 200px;
      background: #FFE4B5;
      border-radius: 50%;
      position: absolute;
      top: 50px;
      left: 50px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .eye {
      width: 30px;
      height: 30px;
      background: white;
      border-radius: 50%;
      position: absolute;
      top: 70px;
    }

    .eye-left { left: 50px; }
    .eye-right { right: 50px; }

    .pupil {
      width: 15px;
      height: 15px;
      background: #333;
      border-radius: 50%;
      position: absolute;
      top: 7.5px;
      left: 7.5px;
    }

    .eyebrow {
      width: 40px;
      height: 5px;
      background: #8B4513;
      border-radius: 3px;
      position: absolute;
      top: 50px;
    }

    .eyebrow-left { left: 45px; }
    .eyebrow-right { right: 45px; }

    #mouth {
      width: 80px;
      height: 40px;
      border: 5px solid #FF6B6B;
      border-top: none;
      border-radius: 0 0 80px 80px;
      position: absolute;
      bottom: 50px;
      left: 60px;
    }

    #status {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      font-size: 18px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>
  <div id="avatar-container">
    <div id="face">
      <div class="eye eye-left">
        <div class="pupil"></div>
      </div>
      <div class="eye eye-right">
        <div class="pupil"></div>
      </div>
      <div class="eyebrow eyebrow-left"></div>
      <div class="eyebrow eyebrow-right"></div>
      <div id="mouth"></div>
    </div>
  </div>
  <div id="status">Neutral</div>

  <script>
    // Avatar animation logic
    function setExpression(expression) {
      document.getElementById('status').textContent = expression;
    }

    // Listen for IPC messages from main process
    window.addEventListener('DOMContentLoaded', () => {
      setExpression('Ready');
    });
  </script>
</body>
</html>
