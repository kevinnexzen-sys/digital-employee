<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Live Preview - PersonalClaw</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #1e1e1e;
      color: #d4d4d4;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #header {
      background: #2d2d30;
      padding: 15px 20px;
      border-bottom: 1px solid #3e3e42;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #header h1 {
      font-size: 18px;
      color: #fff;
    }

    #controls {
      display: flex;
      gap: 10px;
    }

    button {
      background: #0e639c;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: #1177bb;
    }

    #content {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    #code-panel {
      flex: 1;
      background: #1e1e1e;
      border-right: 1px solid #3e3e42;
      overflow: auto;
    }

    #preview-panel {
      flex: 1;
      background: white;
      overflow: auto;
    }

    #preview-frame {
      width: 100%;
      height: 100%;
      border: none;
    }

    #status-bar {
      background: #007acc;
      color: white;
      padding: 8px 20px;
      font-size: 12px;
      display: flex;
      justify-content: space-between;
    }

    .code-editor {
      width: 100%;
      height: 100%;
      padding: 20px;
      background: #1e1e1e;
      color: #d4d4d4;
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 14px;
      border: none;
      outline: none;
      resize: none;
    }
  </style>
</head>
<body>
  <div id="header">
    <h1>🦞 Live Preview</h1>
    <div id="controls">
      <button id="refresh-btn">Refresh</button>
      <button id="clear-btn">Clear</button>
    </div>
  </div>

  <div id="content">
    <div id="code-panel">
      <textarea class="code-editor" id="code-input" placeholder="Write your code here..."></textarea>
    </div>
    <div id="preview-panel">
      <iframe id="preview-frame"></iframe>
    </div>
  </div>

  <div id="status-bar">
    <span id="status-text">Ready</span>
    <span id="language-text">HTML</span>
  </div>

  <script>
    const codeInput = document.getElementById('code-input');
    const previewFrame = document.getElementById('preview-frame');
    const statusText = document.getElementById('status-text');

    let debounceTimer;

    codeInput.addEventListener('input', () => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => {
        updatePreview();
      }, 500);
    });

    function updatePreview() {
      const code = codeInput.value;
      const dataUrl = `data:text/html;charset=utf-8,${encodeURIComponent(code)}`;
      previewFrame.src = dataUrl;
      statusText.textContent = 'Preview updated';
    }

    document.getElementById('refresh-btn').addEventListener('click', updatePreview);
    document.getElementById('clear-btn').addEventListener('click', () => {
      codeInput.value = '';
      previewFrame.src = '';
      statusText.textContent = 'Cleared';
    });

    // Sample code
    codeInput.value = `<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    h1 { text-align: center; }
  </style>
</head>
<body>
  <h1>🦞 PersonalClaw Live Preview</h1>
  <p>Edit the code on the left to see changes here!</p>
</body>
</html>`;

    updatePreview();
  </script>
</body>
</html>
